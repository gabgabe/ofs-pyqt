; OFS-PyQt ESP Bridge Firmware
; ============================
; WiFi WebSocket bridge for Servo, MOSFET, Relay outputs
;
; Boards:
;   esp8266  — NodeMCU v2 (primary target)
;   esp32dev — ESP32 DevKit (future: BLE bridge)

[platformio]
default_envs = esp8266

; ── Shared settings ──────────────────────────────────────────────
[common]
monitor_speed = 115200
lib_deps =
    links2004/WebSockets@^2.4.1
    bblanchon/ArduinoJson@^7.1.0
    tzapu/WiFiManager@^2.0.17
build_flags =
    -D ARDUINOJSON_ENABLE_COMMENTS=0
    -D ARDUINOJSON_ENABLE_NAN=0
    -Wall
    -Wextra
    -Wno-unused-parameter

; ── ESP8266 (NodeMCU v2) ─────────────────────────────────────────
[env:esp8266]
platform = espressif8266
board = nodemcuv2
framework = arduino
monitor_speed = ${common.monitor_speed}
lib_deps =
    ${common.lib_deps}
build_flags =
    ${common.build_flags}
    -D TARGET_ESP8266
    -D WEBSOCKETS_NETWORK_TYPE=NETWORK_ESP8266
upload_speed = 921600

; ── ESP32 DevKit (future) ────────────────────────────────────────
[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = ${common.monitor_speed}
lib_deps =
    ${common.lib_deps}
    madhephaestus/ESP32Servo@^3.0.5
build_flags =
    ${common.build_flags}
    -D TARGET_ESP32
upload_speed = 921600
